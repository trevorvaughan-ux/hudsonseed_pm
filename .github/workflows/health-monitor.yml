name: HudsonSeed Health Monitor

# DISABLED 2026-06-10 - redundant with Railway loop (runs every 5min)
# Railway is the live monitor. This was firing 6x/day with missing secrets = noise.
# Re-enable by adding schedule back and setting SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY
# in repo Settings > Secrets > Actions.

on:
  workflow_dispatch:  # manual trigger only

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install supabase requests

      - name: Run Health Monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python health_monitor.py
